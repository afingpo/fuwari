name: Notify Blog Update (Pure Build Mode)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**/*.md'
      - '!src/content/posts/talk/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 确保基础 diff 能跑通

      - name: Get changed files from Git
        id: changed
        run: |
          # 用最简单稳妥的原生命令行抓取
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'src/content/posts/.*\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # 采用 EOF 注入，防止多行路径引发 Invalid 报错
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        if: steps.changed.outputs.has_changes == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Astro Build (注入环境变量)
        if: steps.changed.outputs.has_changes == 'true'
        # ✨ 核心：把 Actions 抓到的路径当成环境变量喂给 Astro 编译流程
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: pnpm astro build

      - name: Read JSON and post notification
        if: steps.changed.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = 108;
            const templatePath = '.github/notify-update.md';

            let jsonPath = 'dist/update-posts.json';
            if (!fs.existsSync(jsonPath) && fs.existsSync('dist/update-posts.json/index.html')) {
              jsonPath = 'dist/update-posts.json/index.html';
            }

            if (!fs.existsSync(jsonPath)) {
              console.log('Error: update-posts.json 未能生成。');
              return;
            }

            const posts = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'));
            if (posts.length === 0) {
              console.log('JSON is empty. Skipping notification.');
              return;
            }

            const commitMsg = require('child_process').execSync('git log -1 --pretty=format:%s').toString().trim().split('\n')[0];
            const commitSha = require('child_process').execSync('git log -1 --pretty=format:%h').toString().trim();

            let template = fs.readFileSync(templatePath, 'utf-8');
            const postLoopMatch = template.match(/\{\{#posts\}\}([\s\S]*?)\{\{\/posts\}\}/);

            if (postLoopMatch) {
              const loopTemplate = postLoopMatch[1];
              const renderedPosts = posts.map(p => {
                let item = loopTemplate
                  .replace(/\{\{title\}\}/g, p.title)
                  .replace(/\{\{summary\}\}/g, p.description || '无摘要')
                  .replace(/\{\{url\}\}/g, p.url);

                if (p.published) {
                  item = item.replace(/\{\{#published\}\}(.*?)\{\{\/published\}\}/g, `$1`).replace(/\{\{published\}\}/g, p.published);
                } else {
                  item = item.replace(/\{\{#published\}\}[\s\S]*?\{\{\/published\}\}/g, '');
                }
                return item;
              }).join('\n');

              template = template.replace(/\{\{#posts\}\}[\s\S]*?\{\{\/posts\}\}/, renderedPosts);
            }

            const finalBody = template
              .replace(/\{\{commitSha\}\}/g, commitSha)
              .replace(/\{\{commitMsg\}\}/g, commitMsg);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: finalBody
            });

            console.log(`Notification sent successfully for ${posts.length} post(s).`);

