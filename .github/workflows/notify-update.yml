name: Notify Blog Update (Pure Build Mode)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**/*.md'  # ✨ 依然由文章变动触发
      - '!src/content/posts/talk/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Build (上帝视角生成)
        run: pnpm astro build # ✨ 让 Actions 在云端编译，完美触发所有 Collection 和 Slug 计算

      - name: Read JSON and post notification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = 108; // 你的目标 Issue 编号
            const templatePath = '.github/notify-update.md';

            // 💡 重点：由于编译 format 配置的不同，做一层路径兼容
            let jsonPath = 'dist/update-posts.json';
            if (!fs.existsSync(jsonPath) && fs.existsSync('dist/update-posts.json/index.html')) {
              jsonPath = 'dist/update-posts.json/index.html';
            }

            if (!fs.existsSync(jsonPath)) {
              console.log('Error: 编译产物中未能找到 update-posts.json，请确保路由或打包配置正确。');
              return;
            }

            // 1. 读取 100% 正确的 Astro 编译后数据
            const posts = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'));
            if (posts.length === 0) {
              console.log('No posts found in JSON.');
              return;
            }

            const commitMsg = require('child_process').execSync('git log -1 --pretty=format:%s').toString().trim().split('\n')[0];
            const commitSha = require('child_process').execSync('git log -1 --pretty=format:%h').toString().trim();

            // 2. 读取并渲染模板
            let template = fs.readFileSync(templatePath, 'utf-8');
            const postLoopMatch = template.match(/\{\{#posts\}\}([\s\S]*?)\{\{\/posts\}\}/);

            if (postLoopMatch) {
              const loopTemplate = postLoopMatch[1];
              const renderedPosts = posts.map(p => {
                let item = loopTemplate
                  .replace(/\{\{title\}\}/g, p.title)
                  .replace(/\{\{summary\}\}/g, p.description || '无摘要')
                  .replace(/\{\{url\}\}/g, p.url);

                if (p.published) {
                  item = item.replace(/\{\{#published\}\}(.*?)\{\{\/published\}\}/g, `$1`).replace(/\{\{published\}\}/g, p.published);
                } else {
                  item = item.replace(/\{\{#published\}\}[\s\S]*?\{\{\/published\}\}/g, '');
                }
                return item;
              }).join('\n');

              template = template.replace(/\{\{#posts\}\}[\s\S]*?\{\{\/posts\}\}/, renderedPosts);
            }

            const finalBody = template
              .replace(/\{\{commitSha\}\}/g, commitSha)
              .replace(/\{\{commitMsg\}\}/g, commitMsg);

            // 3. 发送评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: finalBody
            });

            console.log('Notification sent successfully based on Cloud Astro Build!');

