# .pages.yml
# 严格适配 Pages CMS 官方最新规范 (2.x 版本)

# 1. 媒体资源全局声明
media:
  input: public/assets
  output: /assets

# 2. 内容集合与结构声明
content:
  - name: posts
    label: 博客文章
    type: collection
    path: src/content/posts
    # 🎯 关键修正 1：用 filename 语法锁死 Pages CMS 创建/读取新文件的后缀为 .dj
    filename: "{primary}.dj"
    # 🎯 关键修正 2：声明文件存储格式为标准 YAML-Frontmatter
    format: yaml-frontmatter
    fields:
      - name: title
        label: 标题
        type: string
        required: true

      - name: published
        label: 发布日期
        type: date
        required: true

      - name: updated
        label: 更新日期
        type: date
        required: false

      - name: description
        label: 文章摘要
        type: string
        required: false

      - name: category
        label: 分类
        type: string
        required: false

      - name: tags
        label: 标签
        type: list
        required: false

      - name: image
        label: 封面图片路径
        type: string
        required: false
        description: "例如: /assets/xxxx-p1.webp"

      - name: draft
        label: 草稿隐藏
        type: boolean
        default: false

      - name: comments
        label: 开启评论
        type: boolean
        default: true

      - name: body
        label: 正文内容 (支持 Djot 语法)
        type: rich-text
        required: true
        options:
          format: markdown # 让富文本编辑器输出对 djot 友好的类 markdown 纯文本结构

  - name: spec
    label: 自定义独立页
    type: collection
    path: src/content/spec
    filename: "{primary}.dj"
    format: yaml-frontmatter
    fields:
      - name: title
        label: 页面标题
        type: string
        required: false
      - name: description
        label: 页面描述
        type: string
        required: false
      - name: body
        label: 页面正文
        type: rich-text
        required: true
        options:
          format: markdown
